worker_processes auto;
pid /tmp/nginx.pid;
include /etc/nginx/overrides/main.d/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_requests 30;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    server_tokens off;

    reset_timedout_connection on;
    client_body_timeout 30s;
    client_header_timeout 30s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    error_log /dev/stderr;
    access_log /dev/stdout;

    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_static on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    gzip_types text/plain text/css text/javascript application/javascript application/json application/transit+json image/svg+xml application/wasm;

    proxy_buffer_size 16k;
    proxy_busy_buffers_size 24k; # essentially, proxy_buffer_size + 2 small buffers of 4k
    proxy_buffers 32 4k;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_cache_path /tmp/cache/ levels=2:2 keys_zone=penpot:20m;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid any 48h;
    proxy_cache_key "$host$request_uri";

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    include /etc/nginx/overrides/http.d/*.conf;

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        client_max_body_size 367001600;
        charset utf-8;

        etag off;

        root /var/www/app/;

        location @handle_redirect {
            set $redirect_uri "$upstream_http_location";
            set $redirect_host "$upstream_http_x_host";
            set $redirect_cache_control "$upstream_http_cache_control";
            set $real_mtype "$upstream_http_x_mtype";

            proxy_buffering off;

            proxy_set_header Host "$redirect_host";
            proxy_hide_header etag;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-meta-server-side-encryption;
            proxy_hide_header x-amz-server-side-encryption;
            proxy_ssl_server_name on;
            proxy_pass $redirect_uri;

            add_header x-internal-redirect "$redirect_uri";
            add_header x-cache-control "$redirect_cache_control";
            add_header cache-control "$redirect_cache_control";
            add_header content-type "$real_mtype";
        }

        location /assets {
            proxy_pass http://penpot-backend:6060/assets;
            recursive_error_pages on;
            proxy_intercept_errors on;
            error_page 301 302 307 = @handle_redirect;

            include /etc/nginx/overrides/assets.d/*.conf;
        }

        location /internal/assets {
            internal;
            alias /opt/data/assets;
            add_header x-internal-redirect "$upstream_http_x_accel_redirect";
        }

        location /api/export {
            proxy_pass http://penpot-exporter:6061;
        }

        location /api {
            proxy_pass http://penpot-backend:6060/api;
            proxy_buffering off;
        }

        location /plugins {
            alias /var/www/app/plugins;
            proxy_http_version 1.1;
        }

        location /readyz {
            access_log off;
            proxy_pass http://penpot-backend:6060$request_uri;
        }

        location /ws/notifications {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_pass http://penpot-backend:6060/ws/notifications;
        }

        location /control-center {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://penpot-nitrate:3000$request_uri;
        }

        include /etc/nginx/overrides/server.d/*.conf;

        # Build-Factory: カスタム CSS を独立して配信
        location = /bf-overrides.css {
            alias /etc/nginx/branding/bf-overrides.css;
            add_header Content-Type "text/css" always;
            add_header Cache-Control "no-store" always;
        }

        location / {
            include /etc/nginx/overrides/location.d/*.conf;

            # 翻訳ファイルは BF 上書き反映のため no-cache (generic .js より前に置く)
            location ~* /translation\.[a-z_]+\.js$ {
                add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }

            location ~* \.(js|jpg|png|svg|gif|ttf|woff|woff2|wasm|map)$ {
                add_header Cache-Control "public, max-age=604800" always; # 7 days
            }

            # CSS は no-cache (BF override 反映用)
            location ~* \.css$ {
                add_header Cache-Control "no-store, no-cache, max-age=0" always;
            }

            location ~ ^/[^/]+/(.*)$ {
                return 301 " /404";
            }

            add_header Content-Security-Policy "frame-ancestors *" always;
            add_header Cache-Control "no-store, no-cache, max-age=0" always;

            # HTML 応答に Build-Factory CSS + 言語 override JS を inject
            #   1) navigator.language を ja-JP に偽装 → Penpot 初回 UI が日本語化
            #   2) BF カスタム CSS で Penpot ロゴを Build-Factory 化
            sub_filter '</head>' '<script>(function(){try{Object.defineProperty(navigator,"language",{get:()=>"ja-JP",configurable:true});Object.defineProperty(navigator,"languages",{get:()=>["ja-JP","ja","en"],configurable:true});var ls=window.localStorage;for(var i=0;i<ls.length;i++){var k=ls.key(i);if(k&&k.indexOf("locale")>-1){ls.setItem(k,"\"ja_jp\"");}}}catch(e){}})();</script><link rel="stylesheet" href="/bf-overrides.css?v=4"></head>';
            sub_filter_once on;

            try_files $uri /index.html$is_args$args /index.html =404;
        }
    }
}
