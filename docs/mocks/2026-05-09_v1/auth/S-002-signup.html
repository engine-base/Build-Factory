<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/><title>サインアップ — Build-Factory Mock</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>tailwind.config={theme:{extend:{colors:{eb:{50:'#e6f0ec',100:'#c4dccf',500:'#1a6648',600:'#155238',700:'#103e2a'}},fontFamily:{sans:['"Noto Sans JP"','system-ui','sans-serif'],mono:['"JetBrains Mono"','ui-monospace','monospace']}}}};</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>body{font-family:"Noto Sans JP",system-ui,sans-serif;}.mono{font-family:"JetBrains Mono",monospace;}.gradient-bg{background:radial-gradient(circle at 20% 20%,rgba(26,102,72,0.08) 0%,transparent 50%),#f8fafc;}</style>
</head><body class="gradient-bg min-h-screen flex items-center justify-center px-6 py-12 text-slate-800">
<div class="w-full max-w-sm">
<a href="../index.html" class="flex items-center gap-2 mb-8">
  <div class="w-8 h-8 bg-eb-500 rounded flex items-center justify-center text-white font-bold">B</div>
  <span class="text-[11px] tracking-widest font-bold">BUILD-FACTORY</span>
</a>
<h2 class="text-2xl font-bold text-slate-900">サインアップ</h2>
<p class="text-sm text-slate-500 mt-1.5">ENGINE BASE のアカウントを作成します</p>

<form class="mt-7 space-y-3">
  <div>
    <label class="text-xs font-bold text-slate-700 mb-1 block">氏名</label>
    <input type="text" placeholder="高本まさと" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:border-eb-500"/>
  </div>
  <div>
    <label class="text-xs font-bold text-slate-700 mb-1 block">メールアドレス</label>
    <input type="email" placeholder="masato@engine-base.com" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:border-eb-500"/>
  </div>
  <div>
    <label class="text-xs font-bold text-slate-700 mb-1 block">パスワード <span class="text-slate-400 font-normal">(8 文字以上 + 数字 + 記号)</span></label>
    <input type="password" placeholder="••••••••" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:border-eb-500"/>
    <div class="flex gap-1 mt-2">
      <div class="h-1 flex-1 bg-emerald-500 rounded"></div>
      <div class="h-1 flex-1 bg-emerald-500 rounded"></div>
      <div class="h-1 flex-1 bg-emerald-500 rounded"></div>
      <div class="h-1 flex-1 bg-slate-200 rounded"></div>
    </div>
    <div class="text-[10px] text-emerald-600 mt-1">強度: 強</div>
  </div>
  <div>
    <label class="text-xs font-bold text-slate-700 mb-1 block">アカウント種別</label>
    <select class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg">
      <option>個人 (Phase 1 で利用可)</option>
      <option>会社 (Phase 2 で公開)</option>
    </select>
  </div>
  <label class="flex items-start gap-2 text-xs text-slate-600">
    <input type="checkbox" class="mt-0.5 accent-eb-500"/>
    <span><a href="#" class="text-eb-600 underline">利用規約</a> と <a href="#" class="text-eb-600 underline">プライバシーポリシー</a> に同意します</span>
  </label>
  <button type="button" class="w-full py-2.5 bg-eb-500 hover:bg-eb-600 text-white rounded-lg font-bold text-sm">アカウント作成 →</button>
  <p class="text-center text-xs text-slate-500 pt-2">既にアカウントをお持ちですか? <a href="S-001-login.html" class="text-eb-600 font-bold">ログイン</a></p>
</form>
<div class="mt-12 text-[10px] text-slate-400 mono text-center">S-002 signup · F-002 · T-002-01 · <a href="../index.html" class="hover:underline text-eb-600">← Index</a></div>

</div>
<script>lucide.createIcons();</script>
</body></html>
