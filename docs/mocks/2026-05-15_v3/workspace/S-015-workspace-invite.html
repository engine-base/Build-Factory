<main class="flex-1 overflow-y-auto">
  <div class="max-w-[800px] mx-auto px-6 py-8">
    <div class="text-xs text-slate-500 flex items-center gap-1.5 mb-2"><a href="./S-014-workspace-members.html" class="hover:text-slate-900">メンバー</a><i data-lucide="chevron-right" class="w-3 h-3"></i><span class="text-slate-900 font-medium">招待</span></div>
    <h1 class="text-2xl font-bold mb-1">メンバーを招待</h1>
    <p class="text-sm text-slate-600 mb-6">この workspace への参加リンクを発行</p>

    <section class="bg-white border border-slate-200 rounded-lg p-6 mb-4">
      <h2 class="text-base font-bold mb-4">新規招待</h2>
      <div class="space-y-4">
        <div class="space-y-1.5">
          <label class="text-sm font-medium block">メールアドレス <span class="text-red-600">*</span></label>
          <textarea class="border border-slate-200 bg-white text-sm px-3 py-2 rounded-md w-full min-h-[60px] mono" placeholder="user1@example.com&#10;user2@example.com (複数行で一括招待)"></textarea>
          <p class="text-xs text-slate-500">改行区切りで複数アドレス可</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1.5"><label class="text-sm font-medium block">ロール</label>
            <select class="border border-slate-200 bg-white text-sm h-9 px-3 rounded-md w-full">
              <option>contributor (編集可)</option><option>monitor (読み取り)</option><option>client (限定 view)</option>
            </select>
          </div>
          <div class="space-y-1.5"><label class="text-sm font-medium block">有効期限</label>
            <select class="border border-slate-200 bg-white text-sm h-9 px-3 rounded-md w-full">
              <option>7 日</option><option>3 日</option><option>24 時間</option><option>1 時間</option>
            </select>
          </div>
        </div>

        <details class="border border-slate-200 rounded-md">
          <summary class="cursor-pointer px-3 py-2 text-sm font-medium flex items-center gap-2"><i data-lucide="sliders" class="w-4 h-4 text-slate-500"></i> Custom 権限テンプレート (任意)</summary>
          <div class="p-4 border-t border-slate-200 grid grid-cols-2 gap-2 text-sm">
            <label class="flex items-center gap-2 p-2 border border-slate-200 rounded-md"><input type="checkbox" checked class="w-4 h-4 accent-eb-500" /><span>仕様編集</span></label>
            <label class="flex items-center gap-2 p-2 border border-slate-200 rounded-md"><input type="checkbox" checked class="w-4 h-4 accent-eb-500" /><span>タスク編集</span></label>
            <label class="flex items-center gap-2 p-2 border border-slate-200 rounded-md"><input type="checkbox" class="w-4 h-4 accent-eb-500" /><span>赤線承認</span></label>
            <label class="flex items-center gap-2 p-2 border border-slate-200 rounded-md"><input type="checkbox" class="w-4 h-4 accent-eb-500" /><span>納品承認</span></label>
          </div>
        </details>

        <details class="border border-slate-200 rounded-md">
          <summary class="cursor-pointer px-3 py-2 text-sm font-medium flex items-center gap-2"><i data-lucide="eye" class="w-4 h-4 text-slate-500"></i> 表示 Tabs (client ロール時)</summary>
          <div class="p-4 border-t border-slate-200 grid grid-cols-3 gap-2 text-sm">
            <label class="flex items-center gap-2"><input type="checkbox" checked class="w-4 h-4 accent-eb-500" /><span>dashboard</span></label>
            <label class="flex items-center gap-2"><input type="checkbox" checked class="w-4 h-4 accent-eb-500" /><span>spec_viewer</span></label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4 accent-eb-500" /><span>task_kanban</span></label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4 accent-eb-500" /><span>cost</span></label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4 accent-eb-500" /><span>audit_log</span></label>
            <label class="flex items-center gap-2"><input type="checkbox" class="w-4 h-4 accent-eb-500" /><span>review</span></label>
          </div>
        </details>

        <div class="space-y-1.5">
          <label class="text-sm font-medium block">メッセージ (任意)</label>
          <textarea class="border border-slate-200 bg-white text-sm px-3 py-2 rounded-md w-full min-h-[60px]" placeholder="招待メールに添える短いメッセージ"></textarea>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button class="border border-slate-200 hover:bg-slate-50 text-sm h-9 px-4 rounded-md">キャンセル</button>
          <button class="bg-eb-500 hover:bg-eb-600 text-white text-sm font-semibold h-9 px-4 rounded-md flex items-center gap-2"><i data-lucide="send" class="w-4 h-4"></i> 招待を送信</button>
        </div>
      </div>
    </section>

    <section class="bg-white border border-slate-200 rounded-lg overflow-hidden">
      <div class="px-5 py-3 border-b border-slate-200"><h2 class="text-base font-bold">送信済み招待 (pending)</h2></div>
      <table class="w-full text-sm">
        <thead class="bg-slate-50">
          <tr class="text-[10px] uppercase tracking-wider text-slate-500">
            <th class="text-left font-bold px-4 py-2">宛先</th>
            <th class="text-left font-bold px-4 py-2">Role</th>
            <th class="text-left font-bold px-4 py-2">送信日時</th>
            <th class="text-left font-bold px-4 py-2">期限</th>
            <th class="text-right font-bold px-4 py-2"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-t border-slate-100">
            <td class="px-4 py-3 mono text-xs">aki@new-member.com</td>
            <td class="px-4 py-3"><span class="text-[11px] bg-blue-50 text-blue-700 border border-blue-200 px-2 py-0.5 rounded-full font-medium">contributor</span></td>
            <td class="px-4 py-3 text-xs text-slate-500">2 日前</td>
            <td class="px-4 py-3 text-xs text-amber-600">残 5 日</td>
            <td class="px-4 py-3 text-right space-x-2">
              <button class="text-xs text-eb-500 hover:text-eb-600">再送</button>
              <button class="text-xs text-slate-500 hover:text-slate-900">URL コピー</button>
              <button class="text-xs text-red-500 hover:text-red-700">取消</button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
