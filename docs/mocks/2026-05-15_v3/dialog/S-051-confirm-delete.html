<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-051 削除確認 — Build-Factory</title>
<meta name="bf-screen-id" content="S-051"><meta name="bf-screen-name" content="confirm_delete"><meta name="bf-category" content="dialog"><meta name="bf-status" content="wip"><meta name="bf-version" content="v3">
<script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{colors:{eb:{50:'#f0faf5',500:'#1a6648',600:'#155238',700:'#103e2a'}},fontFamily:{sans:['"Noto Sans JP"','sans-serif'],mono:['"JetBrains Mono"','monospace']}}}};</script>

<body class="bg-slate-900/50 min-h-screen flex items-center justify-center px-6">
<a href="../index.html" style="position:fixed; top:12px; right:12px; z-index:1000; display:inline-flex; align-items:center; gap:6px; padding:6px 12px; background:rgba(255,255,255,0.95); border:1px solid #e2e8f0; border-radius:6px; font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:600; color:#1a6648; text-decoration:none; box-shadow:0 2px 8px rgba(0,0,0,0.06);"><i data-lucide="arrow-left" class="w-3.5 h-3.5"></i><span>Index に戻る</span></a>

<!-- Dialog -->
<div class="bg-white rounded-xl shadow-2xl max-w-[480px] w-full p-6">
  <div class="flex items-start gap-4 mb-4">
    <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center shrink-0"><i data-lucide="alert-triangle" class="w-5 h-5 text-red-600"></i></div>
    <div>
      <h2 class="text-base font-bold text-slate-900">フェーズを削除しますか?</h2>
      <p class="text-sm text-slate-600 mt-1.5 leading-relaxed">この操作は元に戻せません。<strong>Phase 1: 実装</strong> とその配下の以下が削除されます。</p>
    </div>
  </div>
  <div class="bg-slate-50 border border-slate-200 rounded-md p-3 mb-4 text-sm">
    <div class="flex justify-between mb-1"><span class="text-slate-500">配下タスク</span><span class="font-bold mono">23 件</span></div>
    <div class="flex justify-between mb-1"><span class="text-slate-500">セッション履歴</span><span class="font-bold mono">87 件</span></div>
    <div class="flex justify-between"><span class="text-slate-500">納品物 (HTML レポート)</span><span class="font-bold mono">3 件</span></div>
  </div>
  <div class="bg-red-50 border border-red-200 rounded-md p-3 mb-4 flex items-start gap-2">
    <i data-lucide="info" class="w-4 h-4 text-red-600 mt-0.5 shrink-0"></i>
    <div class="text-xs text-red-700">削除する前にデータを export することをお勧めします。<a class="underline">エクスポート</a></div>
  </div>
  <div class="space-y-1.5 mb-4">
    <label class="text-sm font-medium block">確認: フェーズ名を入力</label>
    <input type="text" placeholder="Phase 1: 実装" class="border border-slate-300 text-sm h-9 px-3 rounded-md w-full" />
  </div>
  <div class="flex items-center justify-end gap-2">
    <button class="border border-slate-200 hover:bg-slate-50 text-sm h-9 px-4 rounded-md">キャンセル</button>
    <button class="bg-red-600 hover:bg-red-700 text-white text-sm h-9 px-4 rounded-md font-semibold disabled:opacity-50">削除する</button>
  </div>
</div>
<script>lucide.createIcons();</script>
