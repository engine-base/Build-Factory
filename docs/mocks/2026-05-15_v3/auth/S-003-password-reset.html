<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-003 パスワード再設定 — Build-Factory</title>

<meta name="bf-screen-id" content="S-003">
<meta name="bf-screen-name" content="password_reset">
<meta name="bf-category" content="auth">
<meta name="bf-feature-id" content="F-001">
<meta name="bf-task-ids" content="T-V3-AUTH-10,T-V3-AUTH-03">
<meta name="bf-entities" content="E-001,E-039">
<meta name="bf-related-apis" content="POST /api/auth/password-reset">
<meta name="bf-spec-link" content="../../../functional-breakdown/2026-05-09_v1/screens.json#S-003">
<meta name="bf-design-link" content="../../design-system/DESIGN.md">
<meta name="bf-status" content="wip">
<meta name="bf-version" content="v3">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { eb: { 50:'#f0faf5', 100:'#d3f0e0', 400:'#34b164', 500:'#1a6648', 600:'#155238', 700:'#103e2a' } },
    fontFamily: { sans: ['"Noto Sans JP"','sans-serif'], mono: ['"JetBrains Mono"','monospace'] }
  }}};
</script>
<style>body { font-family: 'Noto Sans JP', sans-serif; line-height: 1.7; } .mono { font-family: 'JetBrains Mono', monospace; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
<a href="../index.html" style="position:fixed; top:12px; right:12px; z-index:1000; display:inline-flex; align-items:center; gap:6px; padding:6px 12px; background:rgba(255,255,255,0.95); border:1px solid #e2e8f0; border-radius:6px; font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:600; color:#1a6648; text-decoration:none; box-shadow:0 2px 8px rgba(0,0,0,0.06); backdrop-filter:blur(8px);">
  <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
  <span>Index に戻る</span>
</a>

<header class="px-6 py-4 border-b border-slate-200 bg-white">
  <div class="flex items-center gap-2 max-w-[1400px] mx-auto">
    <div class="w-7 h-7 rounded-md bg-eb-500 flex items-center justify-center"><i data-lucide="factory" class="w-4 h-4 text-white"></i></div>
    <div class="text-sm font-bold">Build-Factory</div>
    <span class="text-[11px] text-slate-500 mono">v3</span>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-[420px]">
    <a href="./S-001-login.html" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-900 mb-6">
      <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
      ログインに戻る
    </a>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-eb-100 mb-4">
        <i data-lucide="key-round" class="w-6 h-6 text-eb-500"></i>
      </div>
      <h1 class="text-2xl font-bold">パスワード再設定</h1>
      <p class="text-sm text-slate-600 mt-1">登録メールアドレスに再設定リンクを送ります</p>
    </div>

    <!-- STATE A: Request reset email -->
    <div class="bg-white border border-slate-200 rounded-lg p-6 space-y-4">
      <div class="space-y-1.5">
        <label for="email" class="text-sm font-medium block">メールアドレス</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email"
          class="border border-slate-200 bg-white text-sm h-9 px-3 rounded-md w-full focus-visible:outline-none focus-visible:border-eb-500 focus-visible:ring-2 focus-visible:ring-eb-100" />
        <p class="text-xs text-slate-500">登録時のメールアドレスを入力してください</p>
      </div>

      <button type="submit" class="w-full bg-eb-500 hover:bg-eb-600 text-white text-sm font-semibold h-10 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
        <i data-lucide="mail" class="w-4 h-4"></i>
        <span>再設定リンクを送る</span>
      </button>
    </div>

    <!-- STATE B: Email sent (success message - hidden by default) -->
    <div class="hidden bg-white border border-eb-200 rounded-lg p-6 space-y-3 mt-4" data-state="email_sent">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-eb-100 flex items-center justify-center shrink-0">
          <i data-lucide="check" class="w-5 h-5 text-eb-500"></i>
        </div>
        <div>
          <div class="text-sm font-semibold">メールを送信しました</div>
          <div class="text-xs text-slate-600 mt-0.5">受信トレイをご確認ください</div>
        </div>
      </div>
      <div class="text-xs text-slate-500 leading-relaxed pt-3 border-t border-slate-200">
        メールが届かない場合: <br>
        ・迷惑メールフォルダを確認<br>
        ・メールアドレスの入力ミスを確認<br>
        ・5 分待ってから再送信
      </div>
    </div>

    <!-- STATE C: New password input (after clicking email link, ?token=xxx) -->
    <details class="bg-white border border-slate-200 rounded-lg p-6 space-y-4 mt-4" data-state="new_password">
      <summary class="text-sm font-medium cursor-pointer text-slate-600 hover:text-slate-900">
        <span class="inline-flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i>新パスワード入力モード (preview)</span>
      </summary>
      <div class="space-y-4 pt-4">
        <div class="space-y-1.5">
          <label class="text-sm font-medium block">新しいパスワード</label>
          <input type="password" placeholder="12 文字以上" class="border border-slate-200 bg-white text-sm h-9 px-3 rounded-md w-full" />
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium block">確認のため再入力</label>
          <input type="password" placeholder="同じパスワードを入力" class="border border-slate-200 bg-white text-sm h-9 px-3 rounded-md w-full" />
        </div>
        <button class="w-full bg-eb-500 hover:bg-eb-600 text-white text-sm font-semibold h-10 rounded-md transition-colors">パスワードを更新</button>
      </div>
    </details>

    <div class="text-center text-[11px] text-slate-400 mt-8 mono">© ENGINE BASE</div>
  </div>
</main>

<script>lucide.createIcons();</script>
</body>
</html>
