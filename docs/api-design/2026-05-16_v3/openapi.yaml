components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase Auth (GoTrue) issued JWT. Send as `Authorization: Bearer <token>`."


  responses:
    Unauthorized:
      description: 401 Unauthorized — missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: unauthorized
            code: UNAUTHORIZED
            message: missing or invalid token




    Forbidden:
      description: 403 Forbidden — authenticated but RLS / RBAC denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: forbidden
            code: FORBIDDEN
            message: insufficient role




    NotFound:
      description: 404 Not Found — resource does not exist or is hidden by RLS.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: not_found
            code: NOT_FOUND




    Conflict:
      description: 409 Conflict — uniqueness / state conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: conflict
            code: CONFLICT
            message: unique constraint violated




    ValidationError:
      description: 422 Validation Error — request body / params failed schema.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: validation_failed
            code: VALIDATION_ERROR
            details:
              - field: email
                msg: invalid format




    RateLimited:
      description: 429 Too Many Requests — rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer



      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: rate_limited
            code: RATE_LIMITED
            retry_after_sec: 900




    InternalServerError:
      description: 500 Internal Server Error — opaque server failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

          example:
            error: internal_server_error
            code: INTERNAL_SERVER_ERROR





