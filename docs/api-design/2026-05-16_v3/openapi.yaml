      x-bf-error-seeds:
        - status: 401
          code: UNAUTHORIZED
          trigger: invalid credentials (generic, no user enumeration)
          ears_form: "UNWANTED: If invalid credentials (generic, no user enumeration), the system shall return 401."
        - status: 403
          code: FORBIDDEN
          trigger: account locked
          ears_form: "UNWANTED: If account locked, the system shall return 403."
