# Build-Factory: Onlook self-host (OSS 素のまま)
# https://github.com/onlook-dev/onlook
#
# 起動:
#   cd onlook && docker compose up -d
#   → http://localhost:3010 で Onlook が動く
#
# Build-Factory frontend (3001) のリバースプロキシ経由で /design パスから配信する想定。

services:
  onlook:
    # Onlook 公式の dev image。安定したらタグ固定推奨
    image: ghcr.io/onlook-dev/onlook:latest
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      # Build-Factory の API キーを共有（必要に応じて customize）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # OAuth 共有（後で実装）
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: ${ONLOOK_NEXTAUTH_SECRET:-build-factory-onlook-dev}
    volumes:
      # Onlook プロジェクトデータ永続化
      - onlook-data:/app/data
      # Build-Factory の design-systems / skills を読み込み可能に（任意）
      - ../data/design-systems:/app/imported-design-systems:ro
      - ../data/skills:/app/imported-skills:ro

volumes:
  onlook-data:
